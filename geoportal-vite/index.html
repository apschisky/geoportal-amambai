<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoportal de Amambai - MS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/ol@latest/ol.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FL1QM3BJZB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FL1QM3BJZB');
    </script>
</head>
<body>
    <div class="print-firstpage-group">
      <!-- Cabeçalho com logo e título do geoportal -->
      <div class="header">
        <div class="header-institutional">
          <img class="header-emblem" src="/assets/branding/brasao_separado.png" alt="Brasão do Município de Amambai">
        </div>
        <div class="header-brand">
          <img class="header-logo" src="image.svg" alt="Logo do Geoportal de Amambai">
          <span>
            Geoportal de Amambai - MS
          </span>
        </div>
      </div>
      <nav class="geoportal-public-nav" aria-label="Navega&ccedil;&atilde;o p&uacute;blica do Geoportal">
        <div class="geoportal-public-nav-item">
          <button type="button">Locais de Interesse</button>
          <div class="geoportal-public-nav-menu">
            <button type="button" data-layer-shortcut="assistencia">Assist&ecirc;ncia Social</button>
            <button type="button" data-layer-shortcut="educacao">Educa&ccedil;&atilde;o</button>
            <button type="button" data-layer-shortcut="prefeitura">Prefeitura</button>
            <button type="button" data-layer-shortcut="saude">Sa&uacute;de</button>
            <button type="button" data-layer-shortcut="farmacias">Farm&aacute;cias</button>
          </div>
        </div>

        <div class="geoportal-public-nav-item">
          <button type="button">Servi&ccedil;os</button>
          <div class="geoportal-public-nav-menu">
            <button type="button" data-layer-shortcut="coleta-lixo">Coleta de Lixo</button>
            <button type="button" data-layer-shortcut="coleta-seletiva">Coleta Seletiva</button>
            <button type="button" data-layer-shortcut="postes">Postes da Rede El&eacute;trica</button>
          </div>
        </div>

        <div class="geoportal-public-nav-item">
          <button type="button">Mapa</button>
          <div class="geoportal-public-nav-menu">
            <button type="button" data-action="open-layer-panel">Abrir painel de camadas</button>
            <button type="button" data-action="clear-layers">Limpar camadas</button>
          </div>
        </div>
      </nav>
      <!-- Container principal do mapa e ferramentas -->
      <div id="map-container">
        <div id="map">
          <div id="legendas-categorias"></div>
        </div>
        <div class="toolbox">
          <div class="measurement-box" title="Medir">
            <img src="https://img.icons8.com/ios-filled/50/000000/ruler.png" alt="Medir">
            <div class="options">
              <strong>Medir:</strong>
              <button id="measure-distance">Dist&acirc;ncia</button>
              <button id="measure-area">&Aacute;rea</button>
              <button id="clear-measurement">Limpar</button>
            </div>
          </div>
          <div class="search-box" title="Buscar">
            <img src="https://img.icons8.com/ios-filled/50/000000/search.png" alt="Buscar">
            <div class="search-options">
              <strong>Buscar:</strong><br>
              <select id="search-type" style="margin-bottom:4px;">
                <option value="bic">BIC</option>
                <option value="endereco">Endere&ccedil;o</option>
                <option value="poste">Poste</option>
                <option value="fazenda">Im&oacute;veis Rurais</option>
              </select><br>
              <input type="text" id="search-input" placeholder="Digite um endereço, BIC, poste ou fazenda">
              <button id="search-button">Buscar</button>
            </div>
          </div>
          <div class="fullscreen-box" title="Tela Cheia">
            <img src="https://img.icons8.com/ios-filled/50/000000/full-screen.png" alt="Tela Cheia" id="fullscreen-btn">
          </div>
          <div class="print-box" title="Imprimir" style="position: relative;">
                <button id="print-btn" type="button" style="background: none; border: none; padding: 0; cursor: pointer; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <img src="https://img.icons8.com/ios-filled/50/000000/print.png" alt="Imprimir">
                </button>
            </div>
            <div class="geolocate-box" title="Encontrar minha localização">
                <img src="https://img.icons8.com/ios-filled/50/000000/marker.png" alt="Geolocalizar" id="geolocate-btn">
            </div>
        </div>
     <!-- Legenda agora está dentro do #map para sobreposição absoluta na impressão -->
    </div>
    <div class="layer-controls-box" title="Camadas">
        <img src="https://img.icons8.com/ios-filled/50/000000/layers.png" alt="Camadas">
        <div class="layer-controls-content">
          <strong>Camadas:</strong><br>
  
          <div class="theme-group">
            <button class="theme-toggle" type="button">Plano diretor</button>
            <div class="theme-layers">
              <label><input type="checkbox" id="layer2"> Eixo de Adensamento</label><br>
              <label><input type="checkbox" id="layer_aeia"> &Aacute;rea interesse ambiental</label><br>
              <label><input type="checkbox" id="layer_aeie"> &Aacute;rea interesse econ&ocirc;mico</label><br>
              <label><input type="checkbox" id="layer_aeis1"> &Aacute;rea interesse social1</label><br>
              <label><input type="checkbox" id="layer_aeis2"> &Aacute;rea interesse social2</label><br>
              <label><input type="checkbox" id="layer_aeiu"> &Aacute;rea interesse urbano</label><br>
              <label><input type="checkbox" id="layer_apc"> &Aacute;rea de Expans&atilde;o Urbana</label><br>
              <label><input type="checkbox" id="layer_macrozoneamento"> Macrozoneamento</label><br>
              <label><input type="checkbox" id="layer4"> Zoneamento Urbano</label><br>
              <label><input type="checkbox" id="layer_area_protecao_cultural"> &Aacute;rea de Prote&ccedil;&atilde;o Cultural</label><br>
            </div>
          </div>
  
          <div class="theme-group">
            <button class="theme-toggle" type="button">Infraestrutura</button>
            <div class="theme-layers">
              <label><input type="checkbox" id="layer3"> Lotes Urbanos</label><br>
              <label><input type="checkbox" id="layer_edificacoes"> Edifica&ccedil;&otilde;es</label><br>
              <label><input type="checkbox" id="layer_vilas"> Vilas</label><br>
              <label><input type="checkbox" id="layer_pavimentacao"> Pavimenta&ccedil;&atilde;o</label><br>
              <label><input type="checkbox" id="layer_contorno_viario"> Contorno Vi&aacute;rio</label><br>
              <label><input type="checkbox" id="layer_trechosrda"> Rede de &Aacute;gua</label><br>
              <label><input type="checkbox" id="layer_redeesgoto"> Rede de Esgoto</label><br>
              <label><input type="checkbox" id="layer_drenagem_urbana"> Drenagem Urbana</label><br>
              </div>
          </div>
  
          <div class="theme-group">
            <button class="theme-toggle" type="button">Locais de interesse</button>
            <div class="theme-layers">
              <label><input type="checkbox" id="layer_assistencia_social"> Assist&ecirc;ncia Social</label><br>
              <label><input type="checkbox" id="layer_educacao"> Educa&ccedil;&atilde;o</label><br>
              <label><input type="checkbox" id="layer_prefeitura"> Prefeitura</label><br>
              <label><input type="checkbox" id="layer_saude"> Sa&uacute;de</label><br>
              <label><input type="checkbox" id="layer_farmacias"> Farm&aacute;cias</label><br>
            </div>
          </div>

          <div class="theme-group">
            <button class="theme-toggle" type="button">Servi&ccedil;os</button>
            <div class="theme-layers">
              <label><input type="checkbox" id="layer_coleta"> Coleta de Lixo</label><br>
              <label><input type="checkbox" id="layer_coleta_seletiva"> Coleta Seletiva</label><br>
              <label><input type="checkbox" id="layer_postes"> Postes da Rede El&eacute;trica</label><br>
            </div>
          </div>
          
           <div class="theme-group">
            <button class="theme-toggle" type="button">Ambiental</button>
            <div class="theme-layers">
              <label><input type="checkbox" id="layer5"> Terras Ind&iacute;genas</label><br>
              <label><input type="checkbox" id="layer7"> Cursos d'&aacute;gua Amambai</label><br>
              <label><input type="checkbox" id="layer_convergencia_fluxo"> Linhas de escoamento da Chuva</label><br>
              <label><input type="checkbox" id="layer_microbacias_urbana"> Micro bacias urbanas</label><br>
              <label><input type="checkbox" id="layer6"> Sub-bacias do Rio Paran&aacute;</label><br>
              <label><input type="checkbox" id="layer_unidades_conservacao"> Unidades de Conserva&ccedil;&atilde;o</label><br>
              <label><input type="checkbox" id="layer_tipos_solo"> Tipos de Solo</label><br>
              <label><input type="checkbox" id="layer_geologia"> Geologia</label><br>
            </div>
          </div>

          <div class="theme-group">
            <button class="theme-toggle" type="button">Gerais</button>
            <div class="theme-layers">
              <label><input type="checkbox" id="layer1" checked> Per&iacute;metro do Munic&iacute;pio</label><br>
             </div>
          </div>
  
          <div class="theme-group">
            <button class="theme-toggle" type="button">&Aacute;rea rural</button>
            <div class="theme-layers">
              <label><input type="checkbox" id="layer_imoveis_sigef"> Im&oacute;veis Rurais (SIGEF)</label><br>
              <label><input type="checkbox" id="layer_imoveis_snci"> Im&oacute;veis Rurais (SNCI)</label><br>
            </div>
          </div>
  
          <hr>
          <strong>Mapa Base:</strong><br>
          <label><input type="radio" name="basemap" value="osm" checked> OpenStreetMap</label><br>
          <label><input type="radio" name="basemap" value="satellite"> Sat&eacute;lite ESRI</label>
          <button type="button" id="clear-layers-button" class="clear-layers-button">Limpar camadas</button>
        </div>
    </div>
    <div class="coordinate-display" id="mouse-coordinates">Lon: --, Lat: --</div>
    <footer class="footer">
        <span id="copyright-year"></span>
        <a href="https://www.amambai.ms.gov.br/" target="_blank" class="footer-link">www.amambai.ms.gov.br</a>
    </footer>
    <script>
        // Atualizar ano automaticamente
        document.getElementById('copyright-year').textContent = 
            'Todos os direitos reservados a Prefeitura de Amambai - MS, ' + new Date().getFullYear();
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
